<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Patient Dashboard — Browse doctors, manage consultations, update your medical profile">
  <title>Patient Dashboard | HMS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="light-theme">

  <div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-3"></div></div>

  <div class="dashboard-page">

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar-dashboard">
      <div class="nav-content" style="padding: 0 2rem;">
        <a class="nav-logo" href="/" style="display: flex; align-items: center;">
          <img src="/img/logo.png" alt="HMS Logo" style="height: 55px; width: auto; object-fit: contain;">
        </a>
        <div class="nav-actions">
          <div class="nav-user">
            <div class="nav-user-avatar" id="nav-avatar">P</div>
            <div class="nav-user-info">
              <span class="nav-user-name" id="nav-name">Patient</span>
              <span class="nav-user-role">Patient</span>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="dashboard-body">
      <!-- ===== SIDEBAR ===== -->
      <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav" style="padding-top: 2rem;">
          <div class="sidebar-nav-item active" data-tab="tab-doctors" onclick="switchTab(this)">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Find Doctors
          </div>
          <div class="sidebar-nav-item" data-tab="tab-consultations" onclick="switchTab(this)">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            Consultations
          </div>
          <div class="sidebar-nav-item" data-tab="tab-profile" onclick="switchTab(this)">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Profile
          </div>
        </nav>
        <div class="sidebar-footer">
          <div class="sidebar-nav-item sidebar-logout" onclick="logout()">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
          </div>
        </div>
      </aside>

      <!-- ===== MAIN ===== -->
      <main class="main-content">

        <!-- Find Doctors -->
        <div class="tab-content active" id="tab-doctors">
          <div style="padding: 0 3rem; max-width: 1600px;">
            <div class="content-header">
              <h1 class="font-display">Specialist Directory</h1>
              <p>Browse our network of verified medical professionals.</p>
            </div>
            <div style="display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap;">
              <input type="text" class="form-input" id="search-doctor" placeholder="Search by physician name..." oninput="filterDoctors()" style="flex:2;min-width:200px;">
              <select class="form-input" id="filter-specialization" onchange="filterDoctors()" style="flex:1;min-width:150px;">
                <option value="">All Departments</option>
                <option value="Cardiology">Cardiology</option>
                <option value="Neurology">Neurology</option>
                <option value="Orthopedics">Orthopedics</option>
                <option value="Pediatrics">Pediatrics</option>
                <option value="Dermatology">Dermatology</option>
                <option value="General">General Medicine</option>
              </select>
            </div>
            <div class="doctor-grid" id="doctor-grid">
              <div class="empty-state" style="grid-column:1/-1;"><div class="loader" style="margin:0 auto 1rem;"></div><p>Loading doctors…</p></div>
            </div>
          </div>
        </div>

        <!-- Consultations -->
        <div class="tab-content" id="tab-consultations">
          <div style="padding: 0 3rem; max-width: 1600px;">
            <div class="content-header">
              <h1 class="font-display">My Consultations</h1>
              <p>Track requests and active chats.</p>
            </div>
            <div id="consultation-tabs" style="display:flex;gap:0.5rem;margin-bottom:1.75rem;flex-wrap:wrap;">
              <button class="btn btn-secondary active tab-btn" data-filter="all" onclick="filterConsultations(this)">All</button>
              <button class="btn btn-secondary tab-btn" data-filter="pending" onclick="filterConsultations(this)">Pending</button>
              <button class="btn btn-secondary tab-btn" data-filter="accepted" onclick="filterConsultations(this)">Active</button>
              <button class="btn btn-secondary tab-btn" data-filter="closed" onclick="filterConsultations(this)">Closed</button>
            </div>
            <div id="consultation-list">
              <div class="empty-state"><div class="loader" style="margin:0 auto 1rem;"></div><p>Loading…</p></div>
            </div>
          </div>
        </div>

        <!-- Profile -->
        <div class="tab-content" id="tab-profile">
          <div style="padding: 0 3rem; max-width: 1600px;">
            <div class="content-header">
              <h1 class="font-display">Medical Profile</h1>
              <p>Maintain your secure health records.</p>
            </div>
            <div class="card" style="max-width: 800px; margin: 0 auto;">
              <form onsubmit="handleUpdateProfile(event)">
                <!-- Avatar Upload Section -->
                <div class="profile-avatar-upload" style="display:flex; flex-direction:column; align-items:center; margin-bottom: 2rem;">
                  <div style="width: 100px; height: 100px; border-radius: 50%; background: var(--gradient-brand); color: white; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: var(--shadow-sm);">
                    <img id="profile-preview-img" src="" alt="Profile Avatar" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                    <span id="profile-avatar-placeholder">P</span>
                  </div>
                  <label for="profile-image-upload" class="btn btn-secondary btn-sm" style="margin-top: 1rem; cursor: pointer; border-radius: 50px;">
                    Upload Profile Picture
                  </label>
                  <input type="file" id="profile-image-upload" accept="image/*" style="display:none;" onchange="if(window.handleProfileImageUpload) handleProfileImageUpload(this.files[0])">
                </div>
                
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Age</label>
                    <input class="form-input" type="number" id="profile-age" min="0" max="150" placeholder="Age">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Gender</label>
                    <select class="form-input" id="profile-gender">
                      <option value="">Select</option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="other">Other</option>
                    </select>
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">Contact Number</label>
                    <input class="form-input" type="text" id="profile-phone" placeholder="Contact Number">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Blood Group</label>
                    <select class="form-input" id="profile-blood">
                      <option value="">Select</option>
                      <option value="A+">A+</option><option value="A-">A-</option>
                      <option value="B+">B+</option><option value="B-">B-</option>
                      <option value="O+">O+</option><option value="O-">O-</option>
                      <option value="AB+">AB+</option><option value="AB-">AB-</option>
                    </select>
                  </div>
                </div>

                <div class="form-group" style="margin-top: 1.25rem;">
                  <label class="form-label">Medical History</label>
                  <textarea class="form-input" id="profile-history" placeholder="Previous conditions, allergies, or medications…" style="min-height: 120px; resize: vertical; padding: 1.25rem;"></textarea>
                </div>

                <div style="margin-top:2rem;">
                  <button type="submit" class="btn btn-primary btn-lg" style="min-width: 160px;">Save Profile</button>
                </div>
              </form>
            </div>
          </div>
        </div>


      </main>
    </div>

  </div>

  <!-- Consultation Modal -->
  <div id="consultation-modal" class="consultation-modal" onclick="if(event.target===this)closeConsultationModal()">
    <div class="modal-content">
      <h2 class="font-display" style="font-size:1.5rem;margin-bottom:0.35rem;">Request Consultation</h2>
      <p id="modal-doctor-name" style="color:var(--text-secondary);margin-bottom:1.5rem;font-size:0.95rem;"></p>
      <input type="hidden" id="modal-doctor-id">
      <form onsubmit="handleRequestConsultation(event)">
        <div class="form-group form-floating">
          <input class="form-input" type="text" id="modal-symptoms" placeholder=" " required>
          <label for="modal-symptoms">Primary Symptoms</label>
        </div>
        <div class="form-group">
          <label class="form-label">Details (optional)</label>
          <textarea class="form-input" id="modal-description" rows="3" placeholder="Describe your condition…"></textarea>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:1rem;">
          <button type="submit" class="btn btn-primary" style="flex:1;">Send Request</button>
          <button type="button" class="btn btn-secondary" onclick="closeConsultationModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/patient.js"></script>
</body>
</html>
