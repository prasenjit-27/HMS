<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MediConnect</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(135deg, var(--teal-900), var(--slate-900)); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .auth-wrap { width: 100%; max-width: 440px; }
    .auth-logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; }
    .auth-box { background: var(--white); border-radius: 28px; padding: 44px 40px; box-shadow: var(--shadow-lg); }
    .auth-title { font-size: 28px; color: var(--slate-900); margin-bottom: 6px; }
    .auth-subtitle { color: var(--slate-500); font-size: 15px; margin-bottom: 32px; }
    .admin-hint { background: var(--teal-50); border: 1px solid var(--teal-200); border-radius: var(--radius-md); padding: 12px 16px; font-size: 12px; color: var(--teal-700); margin-bottom: 20px; }
  </style>
</head>
<body>
<div id="toast-container" class="toast-container"></div>

<div class="auth-wrap">
  <div class="auth-logo">🏥 MediConnect</div>
  <div class="auth-box">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <div class="admin-hint">
      <strong>Admin Demo:</strong> admin@mediconnect.com / Admin@123<br>
      <em style="font-size:11px">Run <code>node backend/utils/seedAdmin.js</code> to create admin</em>
    </div>

    <div class="alert" id="login-error" style="display:none"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="form-control-icon">
        <span class="icon">✉️</span>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="form-control-icon">
        <span class="icon">🔒</span>
        <input type="password" id="password" class="form-control" placeholder="Your password" onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="handleLogin()">
      Sign In
    </button>

    <p class="text-center mt-16 text-sm text-muted">
      No account yet? <a href="/pages/signup.html" class="text-teal fw-600">Sign Up</a>
    </p>
  </div>
</div>

<div class="modal-overlay" id="verify-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Email Verification Required</h3>
      <button class="modal-close" onclick="closeVerifyModal()">✕</button>
    </div>
    <div class="modal-body" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">📧</div>
      <p class="text-muted" style="margin-bottom:20px">Your email is not verified. Enter the OTP sent to your email.</p>
      <div class="otp-inputs" id="login-otp-inputs">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      </div>
      <div class="alert" id="otp-modal-error" style="display:none;margin-top:16px"></div>
      <button class="btn btn-primary btn-full mt-16" onclick="verifyFromLogin()">Verify Email</button>
      <button onclick="resendLoginOTP()" style="background:none;border:none;color:var(--teal-600);font-size:13px;cursor:pointer;margin-top:12px;font-weight:600">Resend OTP</button>
    </div>
  </div>
</div>

<script type="module">
import { api, setAuth, showToast } from '/js/api.js';

let pendingUserId = null;

const user = localStorage.getItem('user');
if (user) {
  try {
    const u = JSON.parse(user);
    if (u.role === 'admin') window.location.href = '/pages/admin.html';
    else window.location.href = '/pages/dashboard.html';
  } catch {}
}

window.handleLogin = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.className = 'alert alert-error';
    errEl.textContent = 'Email and password are required';
    errEl.style.display = 'flex';
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span> Signing in...';
  btn.disabled = true;

  try {
    const data = await api.post('/auth/login', { email, password });
    setAuth(data.token, data.user);
    showToast(`Welcome back, ${data.user.name}!`, 'success');
    setTimeout(() => {
      if (data.user.role === 'admin') window.location.href = '/pages/admin.html';
      else window.location.href = '/pages/dashboard.html';
    }, 800);
  } catch (err) {
    if (err.message.includes('verify')) {
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const json = await res.json();
      if (json.needsVerification) {
        pendingUserId = json.userId;
        document.getElementById('verify-modal').classList.add('active');
        setupOTPInputs();
      }
    } else {
      errEl.className = 'alert alert-error';
      errEl.textContent = err.message;
      errEl.style.display = 'flex';
    }
    btn.innerHTML = 'Sign In';
    btn.disabled = false;
  }
};

function setupOTPInputs() {
  const inputs = document.querySelectorAll('#login-otp-inputs .otp-input');
  inputs.forEach((inp, i) => {
    inp.value = '';
    inp.addEventListener('input', (e) => {
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val.slice(-1);
      if (val && i < inputs.length - 1) inputs[i + 1].focus();
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
    });
  });
  inputs[0].focus();
}

window.verifyFromLogin = async () => {
  const inputs = document.querySelectorAll('#login-otp-inputs .otp-input');
  const otp = Array.from(inputs).map(i => i.value).join('');
  const errEl = document.getElementById('otp-modal-error');
  if (otp.length !== 6) {
    errEl.className = 'alert alert-error'; errEl.textContent = 'Enter complete 6-digit OTP'; errEl.style.display = 'flex'; return;
  }
  try {
    const data = await api.post('/auth/verify-otp', { userId: pendingUserId, otp });
    setAuth(data.token, data.user);
    showToast('Verified! Redirecting...', 'success');
    setTimeout(() => {
      if (data.user.role === 'doctor') window.location.href = '/pages/doctor-profile-setup.html';
      else window.location.href = '/pages/dashboard.html';
    }, 800);
  } catch (err) {
    errEl.className = 'alert alert-error'; errEl.textContent = err.message; errEl.style.display = 'flex';
  }
};

window.resendLoginOTP = async () => {
  try {
    await api.post('/auth/resend-otp', { userId: pendingUserId });
    showToast('OTP resent!', 'success');
  } catch (err) { showToast(err.message, 'error'); }
};

window.closeVerifyModal = () => {
  document.getElementById('verify-modal').classList.remove('active');
};
</script>
</body>
</html>
