<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secure telemedicine consultation — HMS">
  <title>Secure Chat | HMS</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    #chat-back-btn:hover {
      background-color: var(--bg-body) !important;
      border-color: var(--brand) !important;
      color: var(--brand) !important;
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
  </style>
</head>
<body class="light-theme">

  <div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <div class="chat-page">

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar-dashboard">
      <div class="nav-content" style="padding: 0 2rem; max-width: none; margin: 0; display: flex; align-items: center; justify-content: space-between; width: 100%;">
        <div class="nav-left">
          <a href="#" id="chat-back-btn" class="btn" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text-primary); font-weight: 600; padding: 0.5rem 1rem; border: 1px solid var(--border-default); border-radius: var(--radius-pill); background: #ffffff; transition: all 0.2s ease;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back
          </a>
        </div>
        
        <a class="nav-logo" href="/" style="position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; display: flex; align-items: center;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#chat-ng-min)" stroke-width="2.5"><defs><linearGradient id="chat-ng-min" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        </a>

        <div class="nav-right">
          <div id="chat-header-actions"></div>
        </div>
      </div>
    </nav>

    <!-- ===== CHAT ===== -->
    <div class="chat-wrapper">
      <div class="chat-box">

        <!-- Chat header -->
        <div class="chat-header">
          <div class="chat-header-left">
            <div class="chat-avatar" id="chat-avatar">?</div>
            <div>
              <div class="chat-partner-name" id="chat-partner-name">Connecting…</div>
              <div class="chat-status" id="chat-status">Connecting</div>
            </div>
          </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages" style="flex:1;"></div>

        <!-- Closed banner -->
        <div id="chat-closed-banner" class="chat-closed-banner hidden">
          This consultation has been closed. Chat is now read-only.
        </div>

        <!-- Input -->
        <div class="chat-input-area" id="chat-input-area">
          <label style="cursor:pointer;display:flex;align-items:center;color:var(--text-muted);" title="Attach file">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            <input type="file" style="display:none;" onchange="handleFileUpload(event)">
          </label>
          <textarea class="form-input chat-input" id="message-input" rows="1" placeholder="Type a message…" onkeydown="handleInputKeydown(event)"></textarea>
          <button class="btn btn-primary btn-icon" onclick="sendMessage()" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </div>



  </div>

  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
